# /opt/net_audit/config.ini
# Molti valori sono auto-rilevati da lib/nic.py — modificare solo se necessario.

[General]
# Interfaccia di rete (auto-rilevata se non specificata)
interface =
# Subnet locale CIDR (auto-rilevata)
local_subnet =
# Gateway di default (auto-rilevato)
gateway =
# Target esterno per test di connettività (DHCP opt-252 > questo valore)
target_external = 1.1.1.1,8.8.8.8
timeout = 10

[Telegram]
# Token del bot Telegram (lascia vuoto per disabilitare alerting)
bot_token =
# Chat ID del canale/gruppo dove ricevere le notifiche
chat_id =

[Scan]
# Porte TCP da scansionare nella subnet locale (task PRESEC)
tcp_service_ports = 1-1024,8080,8443,8181,3389,4444,8001,8010,5985,3000,666,5678,44380,44322,5872,3600,500,5900

# Range porte UDP per scan randomizzato (task UDP)
udp_port_ranges = 1-1024,40000-60000

[DNS]
# Hostname usato per i test DNS standard
test_hostname = example.com

[Hygiene]
# Soglia giorni prima della scadenza certificato TLS per warning
cert_expiry_warning_days = 30


[Bluetooth]
device_mac = AA:BB:CC:DD:EE:FF


# Community SNMP aggiuntive da testare (oltre alle default: public, private)
# snmp_extra_communities = mycommunity,internal

# Porte di gestione aggiuntive da controllare (oltre alle built-in)
# extra_mgmt_ports = 9090,15672
